<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Galaxy HSK 1 — Học Từ Vựng Tiếng Trung</title>
<style>
  :root {
    --gold: #f5c842;
    --neon-blue: #00d4ff;
    --neon-pink: #ff2d78;
    --deep: #0a0a1a;
    --card-bg: rgba(255,255,255,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--deep);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARFIELD ── */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ── LAYOUT ── */
  .wrapper { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── HEADER ── */
  header { text-align: center; padding: 40px 0 32px; }
  header h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    background: linear-gradient(90deg, var(--neon-blue), var(--gold), var(--neon-pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px rgba(0,212,255,.4));
    letter-spacing: 2px;
  }
  header p { color: #aaa; margin-top: 8px; font-size: .95rem; }

  /* ── TABS ── */
  .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .tab-btn {
    padding: 10px 26px; border-radius: 999px; border: 2px solid transparent;
    cursor: pointer; font-size: .9rem; font-weight: 600; transition: all .25s;
    background: var(--card-bg); color: #ccc;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--neon-blue), #005faf);
    border-color: var(--neon-blue); color: #fff;
    box-shadow: 0 0 20px rgba(0,212,255,.35);
  }
  .tab-btn:not(.active):hover { border-color: var(--neon-blue); color: var(--neon-blue); }

  /* ── SECTION ── */
  .section { display: none; animation: fadeIn .4s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px);} to { opacity:1; transform:none;} }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }

  .vocab-card {
    perspective: 900px; height: 180px; cursor: pointer;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,0,.2,1);
    border-radius: 16px;
  }
  .vocab-card.flipped .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute; inset: 0; border-radius: 16px;
    backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 14px; text-align: center;
  }
  .card-front {
    background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(0,80,160,.25));
    border: 1px solid rgba(0,212,255,.3);
    box-shadow: 0 4px 30px rgba(0,212,255,.1);
  }
  .card-back {
    background: linear-gradient(135deg, rgba(255,45,120,.18), rgba(120,0,90,.3));
    border: 1px solid rgba(255,45,120,.3);
    transform: rotateY(180deg);
  }
  .card-front .hanzi { font-size: 2.8rem; line-height: 1; text-shadow: 0 0 24px var(--neon-blue); }
  .card-front .tone  { font-size: .78rem; color: var(--gold); margin-top: 6px; letter-spacing: 1px; }
  .card-back .meaning { font-size: 1.1rem; color: #f0f0f0; font-weight: 600; }
  .card-back .pinyin  { font-size: .9rem; color: var(--neon-blue); margin-top: 8px; }
  .card-back .example { font-size: .75rem; color: #bbb; margin-top: 8px; font-style: italic; }

  .flip-hint { font-size: .68rem; color: #555; margin-top: 10px; }

  /* ── SEARCH ── */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .search-bar input {
    flex: 1; padding: 10px 16px; border-radius: 999px;
    border: 1.5px solid rgba(0,212,255,.4);
    background: rgba(255,255,255,.05); color: #fff;
    font-size: .9rem; outline: none; transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--neon-blue); }
  .search-bar input::placeholder { color: #555; }

  .filter-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .tag {
    padding: 5px 14px; border-radius: 999px; font-size: .8rem; cursor: pointer;
    border: 1.5px solid rgba(255,255,255,.15); color: #aaa; transition: all .2s;
  }
  .tag.on { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
  .tag:hover:not(.on) { border-color: var(--gold); color: var(--gold); }

  /* ── QUIZ ── */
  #quiz-section { max-width: 580px; margin: 0 auto; }
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .quiz-score { font-size: 1.1rem; }
  .quiz-score span { color: var(--gold); font-weight: 700; font-size: 1.4rem; }
  .progress-bar { height: 6px; background: rgba(255,255,255,.1); border-radius: 3px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); border-radius: 3px; transition: width .4s; }

  .question-box {
    background: var(--card-bg); border: 1.5px solid rgba(0,212,255,.25);
    border-radius: 20px; padding: 36px 28px; text-align: center; margin-bottom: 24px;
    box-shadow: 0 0 40px rgba(0,212,255,.07);
  }
  .q-hanzi { font-size: 4rem; line-height: 1; text-shadow: 0 0 30px var(--neon-blue); }
  .q-pinyin { color: var(--neon-blue); margin-top: 10px; font-size: 1.05rem; }
  .q-hint   { color: #666; font-size: .8rem; margin-top: 6px; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .opt-btn {
    padding: 14px; border-radius: 14px; border: 2px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.04); color: #e0e0e0;
    font-size: .95rem; cursor: pointer; transition: all .2s; text-align: center;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--neon-blue); background: rgba(0,212,255,.1); color: #fff; }
  .opt-btn.correct { border-color: #00e676; background: rgba(0,230,118,.15); color: #00e676; }
  .opt-btn.wrong   { border-color: var(--neon-pink); background: rgba(255,45,120,.12); color: var(--neon-pink); }

  .quiz-feedback {
    text-align: center; font-size: 1.05rem; min-height: 32px;
    transition: opacity .3s;
  }
  .quiz-feedback.good  { color: #00e676; }
  .quiz-feedback.bad   { color: var(--neon-pink); }

  .next-btn, .restart-btn {
    display: block; margin: 20px auto 0;
    padding: 12px 36px; border-radius: 999px;
    background: linear-gradient(135deg, var(--neon-blue), #005faf);
    color: #fff; font-size: 1rem; font-weight: 700; border: none;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 0 20px rgba(0,212,255,.3);
  }
  .next-btn:hover, .restart-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 0 30px rgba(0,212,255,.5);
  }

  /* ── RESULT ── */
  #result-box { text-align: center; display: none; }
  #result-box h2 { font-size: 2rem; margin-bottom: 12px; }
  #result-box .big-score { font-size: 3.5rem; font-weight: 900; color: var(--gold); }
  #result-box p { color: #aaa; margin: 8px 0; }

  /* ── STROKE SECTION ── */
  #stroke-section .stroke-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;
  }
  .stroke-card {
    background: var(--card-bg); border: 1px solid rgba(255,255,255,.1);
    border-radius: 16px; padding: 20px; text-align: center;
    transition: border-color .2s, box-shadow .2s;
  }
  .stroke-card:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(245,200,66,.15); }
  .stroke-card .big-char { font-size: 3.6rem; line-height: 1; color: var(--gold); text-shadow: 0 0 20px rgba(245,200,66,.4); }
  .stroke-card .sc-info { font-size: .82rem; color: #888; margin-top: 8px; }
  .stroke-card .sc-meaning { font-size: .92rem; color: #ccc; margin-top: 4px; }
  .stroke-card .strokes-label { display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 99px; background: rgba(245,200,66,.15); color: var(--gold); font-size: .75rem; }

  /* ── FOOTER ── */
  footer { text-align: center; padding: 40px 0 10px; color: #333; font-size: .8rem; }
  footer a { color: #555; text-decoration: none; }
  footer a:hover { color: var(--neon-blue); }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed; width: 8px; height: 8px;
    pointer-events: none; z-index: 999;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="wrapper">
  <header>
    <h1>🌌 Galaxy HSK 1</h1>
    <p>Học từ vựng tiếng Trung — lật thẻ, làm quiz, chinh phục từng chữ</p>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('cards')">🃏 Thẻ Từ</button>
    <button class="tab-btn" onclick="showTab('quiz')">🎯 Quiz</button>
    <button class="tab-btn" onclick="showTab('stroke')">✍️ Nét Chữ</button>
  </div>

  <!-- CARDS SECTION -->
  <div id="cards-section" class="section active">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍 Tìm chữ Hán hoặc nghĩa..." oninput="filterCards()">
    </div>
    <div class="filter-tags" id="filter-tags"></div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <!-- QUIZ SECTION -->
  <div id="quiz-section" class="section">
    <div class="quiz-header">
      <div>Câu <span id="q-num">1</span> / <span id="q-total">10</span></div>
      <div class="quiz-score">Điểm: <span id="score">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="question-box" id="question-box">
      <div class="q-hanzi" id="q-hanzi">？</div>
      <div class="q-pinyin" id="q-pinyin"></div>
      <div class="q-hint">Chọn nghĩa tiếng Việt đúng</div>
    </div>
    <div class="options" id="options"></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">Tiếp theo →</button>
    <div id="result-box">
      <div class="big-score" id="final-score">0/10</div>
      <h2 id="result-emoji">🎉</h2>
      <p id="result-msg"></p>
      <button class="restart-btn" onclick="startQuiz()">Chơi Lại 🔄</button>
    </div>
  </div>

  <!-- STROKE SECTION -->
  <div id="stroke-section" class="section">
    <p style="color:#888;margin-bottom:20px;font-size:.9rem;">Ôn lại chữ Hán kèm số nét và bộ thủ</p>
    <div class="stroke-grid" id="stroke-grid"></div>
  </div>
</div>

<footer>
  <p>Made with ❤️ · <a href="https://tiengtrungnhatanh.github.io/b-i-11/" target="_blank">tiengtrungnhatanh.github.io/b-i-11</a></p>
</footer>

<script>
// ── DATA ──
const vocab = [
  { hanzi:"你好", pinyin:"nǐ hǎo",   vi:"Xin chào",         cat:"Giao tiếp",  strokes:12, radical:"人" },
  { hanzi:"谢谢", pinyin:"xiè xie",  vi:"Cảm ơn",           cat:"Giao tiếp",  strokes:17, radical:"言" },
  { hanzi:"对不起",pinyin:"duì bu qǐ",vi:"Xin lỗi",          cat:"Giao tiếp",  strokes:18, radical:"寸" },
  { hanzi:"再见", pinyin:"zài jiàn", vi:"Tạm biệt",         cat:"Giao tiếp",  strokes:14, radical:"见" },
  { hanzi:"我",   pinyin:"wǒ",       vi:"Tôi / Tao",        cat:"Đại từ",     strokes:7,  radical:"手" },
  { hanzi:"你",   pinyin:"nǐ",       vi:"Bạn / Mày",        cat:"Đại từ",     strokes:7,  radical:"人" },
  { hanzi:"他",   pinyin:"tā",       vi:"Anh ấy / Hắn",     cat:"Đại từ",     strokes:5,  radical:"人" },
  { hanzi:"她",   pinyin:"tā",       vi:"Cô ấy / Chị ấy",   cat:"Đại từ",     strokes:6,  radical:"女" },
  { hanzi:"们",   pinyin:"men",      vi:"(chỉ số nhiều)",   cat:"Ngữ pháp",   strokes:5,  radical:"人" },
  { hanzi:"是",   pinyin:"shì",      vi:"Là / Đúng",        cat:"Động từ",    strokes:9,  radical:"日" },
  { hanzi:"不",   pinyin:"bù",       vi:"Không",            cat:"Phó từ",     strokes:4,  radical:"一" },
  { hanzi:"有",   pinyin:"yǒu",      vi:"Có",               cat:"Động từ",    strokes:6,  radical:"月" },
  { hanzi:"好",   pinyin:"hǎo",      vi:"Tốt / Được",       cat:"Tính từ",    strokes:6,  radical:"女" },
  { hanzi:"大",   pinyin:"dà",       vi:"To / Lớn",         cat:"Tính từ",    strokes:3,  radical:"大" },
  { hanzi:"小",   pinyin:"xiǎo",     vi:"Nhỏ / Bé",         cat:"Tính từ",    strokes:3,  radical:"小" },
  { hanzi:"多",   pinyin:"duō",      vi:"Nhiều",            cat:"Tính từ",    strokes:6,  radical:"夕" },
  { hanzi:"少",   pinyin:"shǎo",     vi:"Ít / Thiếu",       cat:"Tính từ",    strokes:4,  radical:"小" },
  { hanzi:"来",   pinyin:"lái",      vi:"Đến / Lại",        cat:"Động từ",    strokes:7,  radical:"木" },
  { hanzi:"去",   pinyin:"qù",       vi:"Đi / Rời",         cat:"Động từ",    strokes:5,  radical:"土" },
  { hanzi:"说",   pinyin:"shuō",     vi:"Nói",              cat:"Động từ",    strokes:9,  radical:"言" },
  { hanzi:"吃",   pinyin:"chī",      vi:"Ăn",               cat:"Động từ",    strokes:6,  radical:"口" },
  { hanzi:"喝",   pinyin:"hē",       vi:"Uống",             cat:"Động từ",    strokes:12, radical:"口" },
  { hanzi:"看",   pinyin:"kàn",      vi:"Nhìn / Xem",       cat:"Động từ",    strokes:9,  radical:"目" },
  { hanzi:"听",   pinyin:"tīng",     vi:"Nghe",             cat:"Động từ",    strokes:7,  radical:"耳" },
  { hanzi:"水",   pinyin:"shuǐ",     vi:"Nước",             cat:"Danh từ",    strokes:4,  radical:"水" },
  { hanzi:"饭",   pinyin:"fàn",      vi:"Cơm / Bữa ăn",     cat:"Danh từ",    strokes:7,  radical:"食" },
  { hanzi:"茶",   pinyin:"chá",      vi:"Trà",              cat:"Danh từ",    strokes:9,  radical:"艹" },
  { hanzi:"书",   pinyin:"shū",      vi:"Sách",             cat:"Danh từ",    strokes:4,  radical:"乙" },
  { hanzi:"猫",   pinyin:"māo",      vi:"Mèo",              cat:"Danh từ",    strokes:11, radical:"犬" },
  { hanzi:"狗",   pinyin:"gǒu",      vi:"Chó",              cat:"Danh từ",    strokes:8,  radical:"犬" },
  { hanzi:"一",   pinyin:"yī",       vi:"Một (1)",          cat:"Số đếm",     strokes:1,  radical:"一" },
  { hanzi:"二",   pinyin:"èr",       vi:"Hai (2)",          cat:"Số đếm",     strokes:2,  radical:"二" },
  { hanzi:"三",   pinyin:"sān",      vi:"Ba (3)",           cat:"Số đếm",     strokes:3,  radical:"一" },
  { hanzi:"四",   pinyin:"sì",       vi:"Bốn (4)",          cat:"Số đếm",     strokes:5,  radical:"囗" },
  { hanzi:"五",   pinyin:"wǔ",       vi:"Năm (5)",          cat:"Số đếm",     strokes:4,  radical:"二" },
  { hanzi:"六",   pinyin:"liù",      vi:"Sáu (6)",          cat:"Số đếm",     strokes:4,  radical:"八" },
  { hanzi:"七",   pinyin:"qī",       vi:"Bảy (7)",          cat:"Số đếm",     strokes:2,  radical:"一" },
  { hanzi:"八",   pinyin:"bā",       vi:"Tám (8)",          cat:"Số đếm",     strokes:2,  radical:"八" },
  { hanzi:"九",   pinyin:"jiǔ",      vi:"Chín (9)",         cat:"Số đếm",     strokes:2,  radical:"乙" },
  { hanzi:"十",   pinyin:"shí",      vi:"Mười (10)",        cat:"Số đếm",     strokes:2,  radical:"十" },
];

// ── STARFIELD ──
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function init(){
    stars = Array.from({length:200},()=>({
      x: Math.random()*c.width, y: Math.random()*c.height,
      r: Math.random()*1.4+.3,
      a: Math.random(), da: (Math.random()-.5)*.005
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(const s of stars){
      s.a += s.da;
      if(s.a<=0||s.a>=1) s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{ resize(); init(); });
  resize(); init(); draw();
})();

// ── TABS ──
function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id+'-section').classList.add('active');
  event.currentTarget.classList.add('active');
  if(id==='quiz') startQuiz();
}

// ── FILTER TAGS ──
const cats = [...new Set(vocab.map(v=>v.cat))];
let activeTag = null;
const tagContainer = document.getElementById('filter-tags');
cats.forEach(cat=>{
  const t = document.createElement('div');
  t.className='tag'; t.textContent=cat;
  t.onclick=()=>{
    activeTag = activeTag===cat ? null : cat;
    document.querySelectorAll('.tag').forEach(x=>x.classList.remove('on'));
    if(activeTag) t.classList.add('on');
    filterCards();
  };
  tagContainer.appendChild(t);
});

// ── CARDS ──
function buildCards(list){
  const grid = document.getElementById('cards-grid');
  grid.innerHTML='';
  list.forEach((w,i)=>{
    const card = document.createElement('div');
    card.className='vocab-card';
    card.innerHTML=`
      <div class="card-inner">
        <div class="card-front">
          <div class="hanzi">${w.hanzi}</div>
          <div class="tone">${w.pinyin}</div>
          <div class="flip-hint">Nhấn để lật</div>
        </div>
        <div class="card-back">
          <div class="meaning">${w.vi}</div>
          <div class="pinyin">${w.pinyin}</div>
          <div class="example">${w.cat}</div>
        </div>
      </div>`;
    card.onclick=()=>{ card.classList.toggle('flipped'); };
    grid.appendChild(card);
    // stagger animation
    card.style.opacity='0';
    card.style.transform='translateY(20px)';
    setTimeout(()=>{
      card.style.transition='opacity .35s, transform .35s';
      card.style.opacity='1'; card.style.transform='none';
    }, i*40);
  });
}

function filterCards(){
  const q = document.getElementById('search-input').value.toLowerCase();
  let list = vocab;
  if(activeTag) list = list.filter(v=>v.cat===activeTag);
  if(q) list = list.filter(v=>v.hanzi.includes(q)||v.vi.toLowerCase().includes(q)||v.pinyin.toLowerCase().includes(q));
  buildCards(list);
}

buildCards(vocab);

// ── STROKE GRID ──
(function(){
  const grid = document.getElementById('stroke-grid');
  vocab.forEach(w=>{
    const c = document.createElement('div');
    c.className='stroke-card';
    c.innerHTML=`
      <div class="big-char">${w.hanzi[0]}</div>
      <div class="sc-meaning">${w.vi}</div>
      <div class="sc-info">${w.pinyin} · Bộ: ${w.radical}</div>
      <span class="strokes-label">${w.strokes} nét</span>`;
    grid.appendChild(c);
  });
})();

// ── QUIZ ──
let qList=[], qIndex=0, score=0, answered=false;
const QUIZ_LEN = 10;

function shuffle(a){ return a.sort(()=>Math.random()-.5); }

function startQuiz(){
  qList = shuffle([...vocab]).slice(0, QUIZ_LEN);
  qIndex=0; score=0; answered=false;
  document.getElementById('result-box').style.display='none';
  document.getElementById('question-box').style.display='';
  document.getElementById('options').style.display='';
  document.getElementById('quiz-feedback').textContent='';
  document.getElementById('score').textContent='0';
  renderQuestion();
}

function renderQuestion(){
  if(qIndex>=QUIZ_LEN){ showResult(); return; }
  const w = qList[qIndex];
  answered=false;
  document.getElementById('q-num').textContent=qIndex+1;
  document.getElementById('q-total').textContent=QUIZ_LEN;
  document.getElementById('q-hanzi').textContent=w.hanzi;
  document.getElementById('q-pinyin').textContent=w.pinyin;
  document.getElementById('quiz-feedback').textContent='';
  document.getElementById('quiz-feedback').className='quiz-feedback';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('progress-fill').style.width=(qIndex/QUIZ_LEN*100)+'%';

  // options: correct + 3 wrong
  const wrong = shuffle(vocab.filter(v=>v.vi!==w.vi)).slice(0,3);
  const opts = shuffle([w,...wrong]);
  const container = document.getElementById('options');
  container.innerHTML='';
  opts.forEach(opt=>{
    const b = document.createElement('button');
    b.className='opt-btn'; b.textContent=opt.vi;
    b.onclick=()=> checkAnswer(opt.vi===w.vi, b);
    container.appendChild(b);
  });
}

function checkAnswer(correct, btn){
  if(answered) return; answered=true;
  const fb = document.getElementById('quiz-feedback');
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===qList[qIndex].vi) b.classList.add('correct');
  });
  if(correct){
    score++; btn.classList.add('correct');
    fb.textContent='✅ Chính xác!'; fb.className='quiz-feedback good';
    document.getElementById('score').textContent=score;
    confettiBurst();
  } else {
    btn.classList.add('wrong');
    fb.textContent='❌ Sai rồi — đáp án: '+qList[qIndex].vi;
    fb.className='quiz-feedback bad';
  }
  document.getElementById('next-btn').style.display='block';
}

function nextQuestion(){
  qIndex++;
  renderQuestion();
}

function showResult(){
  document.getElementById('question-box').style.display='none';
  document.getElementById('options').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('progress-fill').style.width='100%';
  const box = document.getElementById('result-box');
  box.style.display='block';
  document.getElementById('final-score').textContent=score+'/'+QUIZ_LEN;
  const pct = score/QUIZ_LEN;
  let emoji='😅', msg='Hãy ôn lại và thử lần nữa nhé!';
  if(pct>=.9){ emoji='🏆'; msg='Xuất sắc! Bạn là ngôi sao HSK 1! ⭐'; confettiBurst(60); }
  else if(pct>=.7){ emoji='🎉'; msg='Rất tốt! Tiếp tục phát huy nào!'; confettiBurst(30); }
  else if(pct>=.5){ emoji='👍'; msg='Khá ổn! Còn cần luyện thêm một chút.'; }
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-msg').textContent=msg;
}

// ── CONFETTI ──
function confettiBurst(n=20){
  const colors=['#f5c842','#00d4ff','#ff2d78','#00e676','#ff9800'];
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';
    p.style.top='-10px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius=Math.random()>.5?'50%':'0';
    p.style.animationDuration=(Math.random()*1.5+1)+'s';
    p.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

startQuiz();
</script>
