<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luyện Tiếng Trung - HSK 1-4</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-seal"><span class="hanzi-logo">漢</span></div>
      <div class="header-text">
        <h1 class="site-title">Luyện Tiếng Trung</h1>
        <p class="site-subtitle">Học - Luyện - Thành Thạo</p>
      </div>
    </div>
    <div class="corner-ornament top-left"></div>
    <div class="corner-ornament top-right"></div>
  </header>
  <main class="site-main">
    <section id="screen-home" class="screen active">
      <div class="section-title-wrap">
        <span class="section-badge">Bài Tập</span>
        <h2 class="section-title">Chọn Trình Độ</h2>
        <p class="section-desc">Bấm vào cấp độ HSK để xem danh sách bài tập</p>
      </div>
      <div class="level-grid">
        <div class="level-card" data-level="1">
          <div class="level-icon"><span class="level-hanzi">初</span></div>
          <div class="level-info"><span class="level-label">HSK 1</span><span class="level-sublabel">Sơ Cấp</span></div>
          <div class="level-count">15 bài</div><div class="card-arrow">›</div>
        </div>
        <div class="level-card" data-level="2">
          <div class="level-icon"><span class="level-hanzi">初</span></div>
          <div class="level-info"><span class="level-label">HSK 2</span><span class="level-sublabel">Sơ-Trung Cấp</span></div>
          <div class="level-count">15 bài</div><div class="card-arrow">›</div>
        </div>
        <div class="level-card" data-level="3">
          <div class="level-icon"><span class="level-hanzi">中</span></div>
          <div class="level-info"><span class="level-label">HSK 3</span><span class="level-sublabel">Trung Cấp</span></div>
          <div class="level-count">15 bài</div><div class="card-arrow">›</div>
        </div>
        <div class="level-card" data-level="4">
          <div class="level-icon"><span class="level-hanzi">高</span></div>
          <div class="level-info"><span class="level-label">HSK 4</span><span class="level-sublabel">Trung-Cao Cấp</span></div>
          <div class="level-count">15 bài</div><div class="card-arrow">›</div>
        </div>
      </div>
      <div class="home-ornament"><span>❧</span><span>学而时习之</span><span>❧</span></div>
    </section>
    <section id="screen-list" class="screen">
      <div class="screen-header">
        <button class="btn-back" id="btn-back-home">← Quay lại danh sách trình độ</button>
        <h2 class="screen-title" id="list-title">HSK 1</h2>
      </div>
      <div class="lesson-grid" id="lesson-grid"></div>
    </section>
    <section id="screen-lesson" class="screen">
      <div class="screen-header">
        <button class="btn-back" id="btn-back-list">← Quay lại danh sách bài</button>
        <h2 class="screen-title" id="lesson-title">HSK 1 - Bài 1</h2>
      </div>
      <div class="lesson-body" id="lesson-body"></div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="footer-ornament"><span>◈</span><span>Chúc bạn học tốt tiếng Trung</span><span>◈</span></div>
  </footer>
  <script src="script.js?v=7"></script>
</body>
</html>
